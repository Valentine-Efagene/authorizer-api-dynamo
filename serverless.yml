service: authorizer-api-dynamo

frameworkVersion: '4'

custom:
  permissionsTableName: ${env:PERMISSIONS_TABLE, 'RolePolicies'}
  permissionsTableArn: ${env:PERMISSIONS_TABLE_ARN, 'arn:aws:dynamodb:us-east-1:898751738669:table/RolePolicies'}

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors: true
  environment:
    NODE_ENV: ${self:provider.stage}
    STAGE: ${self:provider.stage}
    PERMISSIONS_TABLE: ${self:custom.permissionsTableName}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
          Resource:
            - ${self:custom.permissionsTableArn}

functions:
  api:
    handler: dist/lambda.handler
    timeout: 30
    memorySize: 256
    events:
      - httpApi:
          path: /health
          method: GET
      - httpApi:
          path: /openapi.json
          method: GET
      - httpApi:
          path: /api-docs
          method: GET
      - httpApi:
          path: /{proxy+}
          method: ANY

plugins:
  - serverless-offline

package:
  patterns:
    - dist/**
